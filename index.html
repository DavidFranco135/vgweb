<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Título e descrição ── -->
    <title>GigaNet Telecom</title>
    <meta name="description" content="Central do Assinante GigaNet Telecom" />
    <meta name="application-name" content="GigaNet" />

    <!-- ── Favicon (aba do navegador) ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="shortcut icon" href="/favicon-32.png" />

    <!-- ── Apple / iOS: ícone ao salvar na tela inicial ── -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GigaNet" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Cor da barra do navegador (Android Chrome) ── -->
    <meta name="theme-color" content="#004aad" />

    <!-- ── Open Graph (compartilhamento) ── -->
    <meta property="og:title" content="GigaNet Telecom" />
    <meta property="og:description" content="Central do Assinante GigaNet Telecom" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
